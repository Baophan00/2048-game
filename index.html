<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 Irys Arcade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <img src="./left-mascot.png" class="mascot left">
  <img src="./right-mascot.png" class="mascot right">


  <div class="game-container">
    <div class="title">2048 Irys Arcade</div>

    <div class="score-box">
      <span>Score:</span> <span id="score">0</span> |
      <span>High:</span> <span id="high-score">0</span>
    </div>

    <div id="grid-container"></div>

    <button id="restart">Restart</button>

    <div id="game-over" class="game-over" style="display: none;">GAME OVER</div>
    <div id="you-win" class="win" style="display: none;">YOU WIN!</div>

    <div class="info">Use arrow keys to move tiles</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
